<body>

<h1>ছুটির হিসাব</h1>

<div class="card">

<select id="teacher" onchange="showLeave()">

<option value="">
শিক্ষক নির্বাচন করুন
</option>

<option>
মোঃ আব্দুর রহমান
</option>

<option>
সেলিনা পারভীন
</option>

<option>
সম্রাট সিয়াম
</option>

<option>
মরিয়ম আক্তার
</option>

</select>


<div id="leavebox">

মোট ছুটি

<input
type="number"
id="total"
value="20"



ভোগকৃত ছুটি

<input
type="number"
id="used"
value="0"



পাওনা ছুটি

<div id="remain">
20
</div>

<br>

<button onclick="saveLeave()">
Save
</button>

</div>

</div>

<script>

function showLeave(){

let teacher=
document.getElementById("teacher").value;

if(teacher==""){

document.getElementById("leavebox")
.style.display="none";

return;

}

document.getElementById("leavebox")
.style.display="block";

let saved=
localStorage.getItem(teacher);

if(saved){

saved=
JSON.parse(saved);

document.getElementById("total")
.value=saved.total;

document.getElementById("used")
.value=saved.used;

}

else{

document.getElementById("total")
.value=20;

document.getElementById("used")
.value=0;

}

calculateLeave();

}


function calculateLeave(){

let total=
Number(
document.getElementById("total")
.value
);

let used=
Number(
document.getElementById("used")
.value
);

document.getElementById("remain")
.innerHTML=
total-used;

}


function saveLeave(){

let teacher=
document.getElementById("teacher")
.value;

let info={

total:
document.getElementById("total")
.value,

used:
document.getElementById("used")
.value

};

localStorage.setItem(
teacher,
JSON.stringify(info)
);

calculateLeave();

alert("সেভ হয়েছে");

}


document
.getElementById("used")
.addEventListener(
"input",
calculateLeave
);

</script>

</body>

</html>
