<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ছুটির হিসাব</title>

<style>

body{
font-family:Arial;
background:#eaf7ff;
padding:20px;
}

.card{
max-width:700px;
margin:auto;

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.12);

}

h1{
text-align:center;
color:#003399;
}

select,
input,
button{

width:100%;

padding:14px;

font-size:20px;

margin-top:10px;

margin-bottom:20px;

border-radius:10px;

border:1px solid #ddd;

}

button{

background:#1565C0;

color:white;

border:none;

}

#leavebox{

display:none;

}

#remain{

font-size:40px;

color:green;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<h1>
ছুটির হিসাব
</h1>


<select
id="teacher"
onchange="showLeave()"



<option value="">
শিক্ষক নির্বাচন করুন
</option>

<option>
স্বরুপ দাস(প্রশি)
</option>

<option>
সোছাঃ সেলিনা খাতুন
</option>

<option>
আতিকুর রহমান
</option>

<option>
সেলিনা পারভীন
</option>

<option>
সরদার পিয়ারী খানম
</option>

<option>
মেরিনা পারভীন
</option>

</select>


<div id="leavebox">

মোট ছুটি

<input
type="number"
id="total"
value="20"



ভোগকৃত ছুটি

<input
type="number"
id="used"
value="0"
oninput="calculateLeave()"



পাওনা ছুটি

<div id="remain">
20
</div>

<br>

<button onclick="saveLeave()">
Save
</button>

</div>

</div>


<script>

function showLeave(){

let teacher=
document.getElementById(
"teacher"
).value;

if(teacher==""){

document
.getElementById(
"leavebox"
)
.style.display=
"none";

return;

}

document
.getElementById(
"leavebox"
)
.style.display=
"block";

let saved=
localStorage
.getItem(
teacher
);

if(saved){

saved=
JSON.parse(saved);

document
.getElementById(
"total"
)
.value=
saved.total;

document
.getElementById(
"used"
)
.value=
saved.used;

}

else{

document
.getElementById(
"total"
)
.value=
20;

document
.getElementById(
"used"
)
.value=
0;

}

calculateLeave();

}



function calculateLeave(){

let total=
Number(
document
.getElementById(
"total"
)
.value
);

let used=
Number(
document
.getElementById(
"used"
)
.value
);

document
.getElementById(
"remain"
)
.innerHTML=
total-used;

}



function saveLeave(){

let teacher=
document
.getElementById(
"teacher"
)
.value;

let info={

total:
document
.getElementById(
"total"
)
.value,

used:
document
.getElementById(
"used"
)
.value

};

localStorage
.setItem(

teacher,

JSON.stringify(
info
)

);

alert(
"সেভ হয়েছে"
);

}

</script>

</body>

</html>
Compose
