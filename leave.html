<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>ছুটির হিসাব</title>

<style>

body{
background:#eefcff;
font-family:Arial;
}

.box{
width:700px;
margin:auto;
margin-top:40px;

background:white;

padding:30px;

border-radius:20px;

}

select,
input,
button{

width:100%;

padding:15px;

margin-top:10px;

margin-bottom:20px;

font-size:22px;

}

button{

background:#2356ff;

color:white;

border:none;

cursor:pointer;

}

#remain{

font-size:45px;

color:green;

font-weight:bold;

}

</style>

</head>

<body>

<div class="box">

<h1 align="center">
ছুটির হিসাব
</h1>


<select
id="teacher"
onchange="showLeave()"
>

<option value="">
শিক্ষক নির্বাচন করুন
</option>

<option>
মোঃ আব্দুর রহমান
</option>

<option>
মোছাঃ সেলিনা খাতুন
</option>

<option>
মোঃ রুবেল হোসেন
</option>

<option>
মোছাঃ শারমিন আক্তার
</option>

<option>
মোঃ সোহেল রানা
</option>

<option>
মোছাঃ নাসরিন সুলতানা
</option>

</select>



<div
id="leavebox"

style="display:none"
>

মোট ছুটি

<input
id="total"
type="number"
value="20"
oninput="calculateLeave()"
>

ভোগকৃত ছুটি

<input
id="used"
type="number"
value="0"
oninput="calculateLeave()"
>

পাওনা ছুটি

<div id="remain">

20

</div>

<br>

<button
onclick="saveLeave()"
>

Save

</button>

</div>

</div>


<script>

function showLeave(){

let teacher=
document
.getElementById(
"teacher"
)
.value;

if(
teacher==""
){

document
.getElementById(
"leavebox"
)
.style.display=
"none";

return;

}

document
.getElementById(
"leavebox"
)
.style.display=
"block";


let saved=
localStorage
.getItem(
teacher
);


if(saved){

saved=
JSON.parse(
saved
);

document
.getElementById(
"total"
)
.value=
saved.total;

document
.getElementById(
"used"
)
.value=
saved.used;

}

else{

document
.getElementById(
"total"
)
.value=
20;

document
.getElementById(
"used"
)
.value=
0;

}

calculateLeave();

}



function calculateLeave(){

let total=
Number(
document
.getElementById(
"total"
)
.value
);

let used=
Number(
document
.getElementById(
"used"
)
.value
);


document
.getElementById(
"remain"
)
.innerHTML=
total-used;

}



function saveLeave(){

let teacher=

document
.getElementById(
"teacher"
)
.value;


let info={

total:

document
.getElementById(
"total"
)
.value,

used:

document
.getElementById(
"used"
)
.value

};


localStorage
.setItem(

teacher,

JSON.stringify(
info
)

);


calculateLeave();


alert(
"সেভ হয়েছে"
);

}

</script>


</body>

</html>
