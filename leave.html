<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ছুটির হিসাব</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#E8F4FF,#F8FBFF);
padding:20px;
}

h1{
text-align:center;
color:#1555C0;
font-size:48px;
}

select,input{
width:100%;
max-width:500px;
padding:15px;
font-size:22px;
border:none;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

#leavebox{

display:none;

background:white;

padding:25px;

margin-top:25px;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.15);

max-width:700px;

}

.label{

font-size:28px;

margin-bottom:10px;

}

#remain{

font-size:40px;

color:green;

font-weight:bold;

}

button{

padding:15px 40px;

font-size:24px;

background:#1555C0;

color:white;

border:none;

border-radius:12px;

cursor:pointer;

}

button:hover{

background:#003EA0;

}

</style>

</head>

<body>

<h1>ছুটির হিসাব</h1>

<select id="teacher" onchange="showLeave()">

<option value="">শিক্ষক নির্বাচন করুন</option>

<option>স্বরুপ দাস (প্রধান শিক্ষক)</option>

<option>মোঃ আতিকুর রহমান</option>

<option>সেলিনা খাতুন</option>

<option>সরদার সিয়ারী খানম</option>

<option>মেরিনা পারভীন</option>

</select>

<br><br>

<div id="leavebox">

<div class="label">
মোট ছুটি:
</div>

<input
type="number"
id="total"
value="20"
oninput="calculateLeave()">

<br><br>

<div class="label">
ভোগকৃত ছুটি:
</div>

<input
type="number"
id="used"
value="0"
oninput="calculateLeave()">

<br><br>

<div class="label">
পাওয়া ছুটি:
</div>

<div id="remain">
20
</div>

<br><br>

<button onclick="saveLeave()">
Save
</button>

</div>

<script>

let data={};

function showLeave(){

let teacher=
document.getElementById("teacher").value;

if(teacher==""){
document.getElementById("leavebox").style.display="none";
return;
}

document.getElementById("leavebox")
.style.display="block";

if(localStorage.getItem(teacher)){

data=JSON.parse(
localStorage.getItem(teacher)
);

document.getElementById("total").value=data.total;

document.getElementById("used").value=data.used;

}

else{

document.getElementById("total").value=20;

document.getElementById("used").value=0;

}

calculateLeave();

}

function calculateLeave(){

let total=
Number(
document.getElementById("total").value
);

let used=
Number(
document.getElementById("used").value
);

document.getElementById("remain")
.innerHTML=total-used;

}

function saveLeave(){

let teacher=
document.getElementById("teacher").value;

let info={

total:
document.getElementById("total").value,

used:
document.getElementById("used").value

};

localStorage.setItem(
teacher,
JSON.stringify(info)
);

  localStorage.setItem(
teacher,
JSON.stringify(info)
);

alert("সেভ হয়েছে");

}
calculateLeave();

alert("সেভ হয়েছে");

}

</script>

</body>
</html>
