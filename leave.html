<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>ছুটির হিসাব</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#E3F2FD,#F8FBFF);
padding:20px;
}

h1{
text-align:center;
font-size:48px;
color:#1565C0;
}

select{

width:100%;

max-width:500px;

padding:15px;

font-size:22px;

border:none;

border-radius:12px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

#leavebox{

display:none;

background:white;

padding:25px;

margin-top:25px;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.15);

max-width:700px;

}

input{

padding:12px;

font-size:22px;

width:140px;

border-radius:10px;

border:2px solid #90CAF9;

}

#remain{

font-size:40px;

color:#2E7D32;

font-weight:bold;

}

.label{

font-size:24px;

}

</style>

</head>

<body>

<h1>ছুটির হিসাব</h1>

<select id="teacher"
onchange="showLeave()">

<option>
শিক্ষক নির্বাচন করুন
</option>

<option>
স্বরুপ দাস (প্রধান শিক্ষক)
</option>

<option>
মোঃ আতিউর রহমান
</option>

<option>
মোসাঃ সেলিনা খাতুন
</option>

<option>
সেলিনা পারভীন
</option>

<option>
সরদার পিয়ারী খানম
</option>

<option>
মেরিনা পারভীন
</option>

</select>

<div id="leavebox">

<br>

<div class="label">
মোট ছুটি:
</div>

<input
type="number"
id="total"
value="20">

<br><br>

<div class="label">
ভোগকৃত ছুটি:
</div>

<input
type="number"
id="used"
value="0">

<br><br>

<div class="label">
পাওনা ছুটি:
</div>

<div id="remain">
20
<br><br>

<button onclick="saveLeave()">
Save
</button>
</div>

</div>

<script>

function showLeave(){

document
.getElementById(
"leavebox"
)
.style
.display=
"block";

calc();

}
<br><br>

<button onclick="saveLeave()">
Save
</button>
function calculateLeave(){

let total=
document.getElementById("total").value;

let used=
document.getElementById("used").value;

document.getElementById("remain")
.innerHTML=
total-used;

}

function saveLeave(){

calculateLeave();

alert("সেভ হয়েছে");

}
function calc(){

let total=
Number(
document
.getElementById(
"total"
).value
);

let used=
Number(
document
.getElementById(
"used"
).value
);

document
.getElementById(
"remain"
)
.innerHTML=
total-used;

}

document
.querySelectorAll(
"input"
)

.forEach(

function(i){

i.oninput=
calc;

}

);

</script>

</body>

</html>
Compose
