<h1>ছুটির হিসাব</h1>

<select id="teacher" onchange="showLeave()">

<option value="">শিক্ষক নির্বাচন করুন</option>

<option>স্বরুপ দাস (প্রধান শিক্ষক)</option>

<option>মোঃ আতিউর রহমান</option>

<option>মোসাঃ সেলিনা খাতুন</option>

<option>সেলিনা পারভীন</option>

<option>সরদার পিয়ারী খানম</option>

<option>মেরিনা পারভীন</option>

</select>

<br><br>

<div id="leavebox" style="display:none;">

মোট ছুটি:
<input type="number" id="total" value="20">

<br><br>

ভোগকৃত ছুটি:
<input type="number" id="used" value="0">

<br><br>

পাওনা ছুটি:
<b id="remain">20</b>

</div>

<script>

function showLeave(){

document
.getElementById("leavebox")
.style.display="block";

calc();

}

function calc(){

let total=
Number(
document.getElementById("total").value
);

let used=
Number(
document.getElementById("used").value
);

document
.getElementById("remain")
.innerHTML=
total-used;

}

document
.querySelectorAll("input")
.forEach(function(i){

i.oninput=calc;

});

</script>
