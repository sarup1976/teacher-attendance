<!DOCTYPE html>
<html>
<head>

<style>

}

<body>

<option>Leave</option>

<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মোছাঃ সেলিনা খাতুন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
সেলিনা পারভীন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
সরদার পিয়ারী খানম
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মেরিনা পারভীন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>
