}

}

.present{
background:#0f9d58;

}

.leave{

}

padding:12px 20px;
background:#2E7D32;
color:white;

}

>

</head>

<body>
<h2 style="text-align:center;color:#1565C0;font-size:48px;">
আজমপুর সপ্রাবি, দর্শনা
</h2>
<h1>শিক্ষক উপস্থিতি</h1> 
  <div style="margin-bottom:20px;">

<button onclick="location.href='index.html'">
উপস্থিতি
</button>

<button onclick="location.href='leave.html'"
style="
margin-left:10px;
background:#1565C0;
color:white;
">
ছুটির হিসাব
</button>

</div>

<div id="date"></div>

<div class="card">
<span class="teacher-name">
স্বরূপ দাস (প্রধান শিক্ষক)
</span>

<select class="present" onchange="changeStatusColor(this)">
<option value="Present">Present</option>
<option value="Leave">Leave</option>
<option value="Absent">Absent</option>
</select>


</div>

<div class="card">
  <span class="teacher-name">
মোঃ আতিকুর রহমান (সহঃ শিক্ষক)
</span>
<select class="present" onchange="changeStatusColor(this)">
<option value="Present">Present</option>
<option value="Leave">Leave</option>
<option value="Absent">Absent</option>
</select>
</div>

<div class="card">
  <span class="teacher-name">
মোছাঃ সেলিনা খাতুন
</span>
    <select class="present" onchange="changeStatusColor(this)">
<option value="Present">Present</option>
<option value="Leave">Leave</option>
<option value="Absent">Absent</option>
</select>
</div>

<div class="card">
  <span class="teacher-name">
সেলিনা পারভীন
    </span>
<select class="present" onchange="changeStatusColor(this)">
<option value="Present">Present</option>
<option value="Leave">Leave</option>
<option value="Absent">Absent</option>
</select>
</div>

<div class="card">
  <span class="teacher-name">
সরদার পিয়ারী খানম
    </span>
<select class="present" onchange="changeStatusColor(this)">
<option value="Present">Present</option>
<option value="Leave">Leave</option>
<option value="Absent">Absent</option>
</select>
</div>

<div class="card">
  <span class="teacher-name">
মেরিনা পারভীন
    </span>
<select class="present" onchange="changeStatusColor(this)">
<option value="Present">Present</option>
<option value="Leave">Leave</option>
<option value="Absent">Absent</option>
</select>
</div>

<br>

<button onclick="saveAttendance()">
Save Attendance
</button>

<script>

function saveAttendance(){

let data=[];

document
.querySelectorAll("select")
.forEach(function(item){

data.push(item.value);

});

localStorage.setItem(
"attendance",
JSON.stringify(data)
);

localStorage.setItem(
"date",
new Date()
.toLocaleDateString("bn-BD")
);

alert("উপস্থিতি Save হয়েছে");

}

window.onload=function(){

document
.getElementById("date")
.innerHTML=
"তারিখ: "+
new Date()
.toLocaleDateString("bn-BD");

let saved=
localStorage
.getItem("attendance");

if(saved){

saved=JSON.parse(saved);

document
.querySelectorAll("select")
.forEach(function(item,index){

if(saved[index]){

item.value=
saved[index];

item.className=
saved[index]
.toLowerCase();

}

item.onchange=
function(){

this.className=
this.value
.toLowerCase();

};

item.dispatchEvent(
new Event("change")
);

});

}

}
document.querySelectorAll("select").forEach(function(item){

item.onchange=function(){

this.className=
this.value.toLowerCase();

};

item.dispatchEvent(
new Event("change")
);

});
</script>

</body>
</html>
