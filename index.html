<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Teacher Attendance
</title>

<style>

body{

background:#EEF4FF;

font-family:Arial;

padding:15px;

}

h1{

text-align:center;

color:#0F2D7A;

font-size:32px;

}

#date{

text-align:center;

margin-bottom:20px;

font-size:18px;

color:#555;

}

.card{

display:flex;

justify-content:space-between;

align-items:center;

background:white;

padding:15px;

margin-bottom:12px;

border-radius:18px;

box-shadow:

0 5px 15px

rgba(0,0,0,.08);

}

.teacher-name{

font-size:18px;

font-weight:600;

color:#1D3E8A;

flex:1;

}

select{

width:135px;

padding:10px;

font-size:16px;

font-weight:bold;

border:none;

border-radius:12px;

cursor:pointer;

}

/* Present */

.present{

background:#DCFCE7;

color:#15803D;

}

/* Absent */

.absent{

background:#FEE2E2;

color:#DC2626;

}

/* Late */

.late{

background:#FEF3C7;

color:#D97706;

}

/* Leave */

.leave{

background:#EDE9FE;

color:#7C3AED;

}

button{

width:100%;

padding:15px;

font-size:18px;

border:none;

border-radius:15px;

background:#2563EB;

color:white;

}

@media(max-width:700px){

.teacher-name{

font-size:15px;

}

select{

width:110px;

}

}

</style>

</head>

<body>

<h1>

আজমপুর সপ্রাবি, দর্শনা

</h1>

<div id="date"></div>


<div class="card">
<div class="teacher-name">
স্বরুপ দাস (প্রধান শিক্ষক)
</div>

<select
class="present"
onchange="this.className=this.value.toLowerCase()">

<option value="Present">
Present
</option>

<option value="Absent">
Absent
</option>

<option value="Late">
Late
</option>

<option value="Leave">
Leave
</option>

</select>

</div>


<div class="card">

<div class="teacher-name">
মোঃ আতিকুর রহমান
</div>

<select
class="present"
onchange="this.className=this.value.toLowerCase()">

<option value="Present">Present</option>

<option value="Absent">Absent</option>

<option value="Late">Late</option>

<option value="Leave">Leave</option>

</select>

</div>


<div class="card">

<div class="teacher-name">
মোছাঃ সেলিনা খাতুন
</div>

<select
class="present"
onchange="this.className=this.value.toLowerCase()">

<option value="Present">Present</option>

<option value="Absent">Absent</option>

<option value="Late">Late</option>

<option value="Leave">Leave</option>

</select>

</div>


<div class="card">

<div class="teacher-name">
সেলিনা পারভীন
</div>

<select
class="present"
onchange="this.className=this.value.toLowerCase()">

<option value="Present">Present</option>

<option value="Absent">Absent</option>

<option value="Late">Late</option>

<option value="Leave">Leave</option>

</select>

</div>


<div class="card">

<div class="teacher-name">
সরদার পিয়ারী খানম
</div>

<select
class="present"
onchange="this.className=this.value.toLowerCase()">

<option value="Present">Present</option>

<option value="Absent">Absent</option>

<option value="Late">Late</option>

<option value="Leave">Leave</option>

</select>

</div>


<div class="card">

<div class="teacher-name">
মেরিনা পারভীন
</div>

<select
class="present"
onchange="this.className=this.value.toLowerCase()">

<option value="Present">Present</option>

<option value="Absent">Absent</option>

<option value="Late">Late</option>

<option value="Leave">Leave</option>

</select>

</div>


<br>

<button
onclick="saveAttendance()">

Save Attendance

</button>


<script>

document
.getElementById("date")
.innerHTML=

"তারিখঃ "+

new Date()
.toLocaleDateString("bn-BD");



function saveAttendance(){

alert(
"উপস্থিতি সেভ হয়েছে"
);

}

</script>

</body>

</html>
