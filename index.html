<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Teacher Attendance</title>

<style>

body{
background:#eef5ff;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
color:#1565C0;
}

#date{
text-align:center;
font-size:18px;
margin-bottom:20px;
}

.card{

display:flex;

justify-content:space-between;

align-items:center;

background:white;

padding:18px;

margin-bottom:15px;

border-radius:18px;

box-shadow:0 6px 20px rgba(0,0,0,.08);

}

.teacher-name{

font-size:24px;

font-weight:bold;

color:#0B5394;

}

select{

min-width:170px;

padding:12px;

border:none;

border-radius:14px;

font-size:18px;

font-weight:bold;

cursor:pointer;

outline:none;

}

/* Present */
.present{
background:#DCFCE7;
color:#15803D;
}

/* Absent */
.absent{
background:#FEE2E2;
color:#DC2626;
}

/* Late */
.late{
background:#FEF3C7;
color:#D97706;
}

/* Leave */
.leave{
background:#EDE9FE;
color:#7C3AED;
}

button{

width:100%;

padding:15px;

font-size:20px;

border:none;

border-radius:15px;

background:#1565C0;

color:white;

}

</style>

</head>

<body>

<h1>শিক্ষক উপস্থিতি</h1>

<div id="date"></div>


<div class="card">
<span class="teacher-name">
স্বরূপ দাস (প্রধান শিক্ষক)
</span>

<select class="present">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
<option value="Late">Late</option>
<option value="Leave">Leave</option>
</select>

</div>


<div class="card">

<span class="teacher-name">
মোঃ আতিউর রহমান (সহঃ শিক্ষক)
</span>

<select class="present">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
<option value="Late">Late</option>
<option value="Leave">Leave</option>
</select>

</div>


<div class="card">

<span class="teacher-name">
মোছাঃ সেলিনা খাতুন
</span>

<select class="present">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
<option value="Late">Late</option>
<option value="Leave">Leave</option>
</select>

</div>


<div class="card">

<span class="teacher-name">
সেলিনা পারভীন
</span>

<select class="present">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
<option value="Late">Late</option>
<option value="Leave">Leave</option>
</select>

</div>


<div class="card">

<span class="teacher-name">
সরদার পিয়ারী খানম
</span>

<select class="present">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
<option value="Late">Late</option>
<option value="Leave">Leave</option>
</select>

</div>


<div class="card">

<span class="teacher-name">
মেরিনা পারভীন
</span>

<select class="present">
<option value="Present">Present</option>
<option value="Absent">Absent</option>
<option value="Late">Late</option>
<option value="Leave">Leave</option>
</select>

</div>

<br>

<button onclick="saveAttendance()">
Save Attendance
</button>


<script>

document
.querySelectorAll("select")
.forEach(function(item){

item.onchange=function(){

this.className=
this.value.toLowerCase();

};

item.dispatchEvent(
new Event("change")
);

});


function saveAttendance(){

let data=[];

document
.querySelectorAll("select")
.forEach(function(item){

data.push(
item.value
);

});

localStorage.setItem(
"attendance",
JSON.stringify(data)
);

alert(
"উপস্থিতি Save হয়েছে"
);

}



window.onload=function(){

document
.getElementById("date")
.innerHTML=

"তারিখ: "+

new Date()
.toLocaleDateString("bn-BD");


let saved=

localStorage
.getItem(
"attendance"
);

if(saved){

saved=
JSON.parse(saved);

document
.querySelectorAll("select")
.forEach(function(
item,
index
){

if(saved[index]){

item.value=
saved[index];

item.className=
saved[index]
.toLowerCase();

}

});

}

}

</script>

</body>

</html>
