<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher Attendance</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#EAF4FF;
}

.card{
border:1px solid #ddd;
padding:10px;
margin:10px;
border-radius:8px;
}

select{
padding:8px;
}
body{
font-family:Arial;
padding:20px;
background:#EAF4FF;
}
button{
padding:10px 20px;
background:#2E7D32;
color:white;
}
.present{
background:#DFF6DD;
}

.absent{
background:#FFD6D6;
}

.late{
background:#FFF2CC;
}

.leave{
background:#E6D5FF;
}
button{
padding:10px 20px;
background:#2E7D32;
color:white;
}
</style>

</head>

<body>

<h1>শিক্ষক উপস্থিতি</h1>
<p id="date"></p>
<div class="card">
স্বরুপ দাস (প্রধান শিক্ষক)
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মোঃ আতিকুর রহমান (সহঃ শিক্ষক)
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মোছাঃ সেলিনা খাতুন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
সেলিনা পারভীন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
সরদার পিয়ারী খানম
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মেরিনা পারভীন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>


<button onclick="saveAttendance()">Save Attendance</button>

<script>

function saveAttendance(){

let data=[];

document.querySelectorAll("select").forEach(function(item){
data.push(item.value);
});

localStorage.setItem(
"attendance",
JSON.stringify(data)
);

localStorage.setItem(
"date",
new Date().toLocaleDateString("bn-BD")
);

alert("উপস্থিতি Save হয়েছে");

}

window.onload=function(){
ody{
font-family:Arial;
padding:20px;
background:#EAF4FF;
}
button{
padding:10px 20px;
background:#2E7D32;
color:white;
}
.present{
background:#DFF6DD;
}

.absent{
background:#FFD6D6;
}

.late{
background:#FFF2CC;
}

.leave{
background:#E6D5FF;
}

document.getElementById("date").innerHTML =
"তারিখ: " +
new Date().toLocaleDateString("bn-BD");

let saved=
localStorage.getItem("attendance");

if(saved){

saved=JSON.parse(saved);

document.querySelectorAll("select")
.forEach(function(item,index){

if(saved[index]){
item.value=saved[index];
}

});

}document.querySelectorAll("select")
.forEach(function(s){

s.onchange=function(){

this.className=
this.value.toLowerCase();

};

s.dispatchEvent(
new Event("change")
);

});

}

</script>
</body>
</html>
