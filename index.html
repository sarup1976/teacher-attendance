<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Teacher Attendance</title>

<style>

body{
font-family:Arial;
padding:15px;
background:#EAF4FF;
}

h1{
color:#0B4F8A;
}

#date{
font-size:18px;
margin-bottom:15px;
}

.card{
background:white;
border-radius:10px;
padding:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

select{
padding:10px;
font-size:16px;
border-radius:6px;
}

button{
padding:12px 20px;
background:#2E7D32;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}

.present{
background:#DFF6DD;
}

.absent{
background:#FFD6D6;
}

.late{
background:#FFF2CC;
}

.leave{
background:#E6D5FF;
}

</style>

</head>

<body>
<h2 style="text-align:center;color:#1565C0;font-size:48px;">
আজমপুর সপ্রাবি, দর্শনা
</h2>
<h1>শিক্ষক উপস্থিতি</h1>

<div id="date"></div>

<div class="card">
স্বরুপ দাস (প্রধান শিক্ষক) 

<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মোঃ আতিকুর রহমান (সহঃ শিক্ষক)
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মোছাঃ সেলিনা খাতুন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
সেলিনা পারভীন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
সরদার পিয়ারী খানম
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<div class="card">
মেরিনা পারভীন
<select>
<option>Present</option>
<option>Absent</option>
<option>Late</option>
<option>Leave</option>
</select>
</div>

<br>

<button onclick="saveAttendance()">
Save Attendance
</button>

<script>

function saveAttendance(){

let data=[];

document
.querySelectorAll("select")
.forEach(function(item){

data.push(item.value);

});

localStorage.setItem(
"attendance",
JSON.stringify(data)
);

localStorage.setItem(
"date",
new Date()
.toLocaleDateString("bn-BD")
);

alert("উপস্থিতি Save হয়েছে");

}

window.onload=function(){

document
.getElementById("date")
.innerHTML=
"তারিখ: "+
new Date()
.toLocaleDateString("bn-BD");

let saved=
localStorage
.getItem("attendance");

if(saved){

saved=JSON.parse(saved);

document
.querySelectorAll("select")
.forEach(function(item,index){

if(saved[index]){

item.value=
saved[index];

item.className=
saved[index]
.toLowerCase();

}

item.onchange=
function(){

this.className=
this.value
.toLowerCase();

};

item.dispatchEvent(
new Event("change")
);

});

}

}

</script>

</body>
</html>
